<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Podcast · Container Options</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#080b10; font-family:'Courier New',monospace; color:#ccc; padding:3rem 2rem; }

nav { display:flex; gap:1rem; margin-bottom:3.5rem; flex-wrap:wrap; }
nav button {
  background:transparent; border:1px solid #2a3040; color:#555;
  padding:0.5rem 1.4rem; font-family:inherit; font-size:0.75rem;
  letter-spacing:0.1em; cursor:pointer; transition:all 0.2s;
}
nav button.active, nav button:hover { border-color:#00e5ff; color:#00e5ff; }
.panel { display:none; }
.panel.active { display:block; }

/* ── shared episode row ── */
.ep-row {
  display:flex; align-items:center; gap:1rem;
  padding:0.65rem 0.9rem; border-bottom:1px solid #0f1520;
  cursor:pointer; transition:background 0.15s; position:relative;
}
.ep-row:hover, .ep-row.active { background:rgba(0,229,255,0.05); }
.ep-row.active { border-left:2px solid #00e5ff; }
.ep-thumb { width:40px; height:40px; flex-shrink:0; border-radius:2px; overflow:hidden; }
.ep-thumb img { width:100%; height:100%; object-fit:cover; }
.ep-info { flex:1; min-width:0; }
.ep-show { font-size:0.52rem; letter-spacing:0.12em; color:#00e5ff55; text-transform:uppercase; }
.ep-title { font-size:0.7rem; color:#7a8898; line-height:1.3; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ep-play { font-size:0.6rem; color:#1a2535; transition:color 0.2s; }
.ep-row:hover .ep-play, .ep-row.active .ep-play { color:#00e5ff; }


/* ════════════════
   A — CASSETTE SHELL
   Click → featured player area drops in above the list
════════════════ */
.cassette-shell {
  background:linear-gradient(160deg,#22263a,#171b28);
  border:2px solid #4a5270; border-radius:18px 18px 28px 28px;
  padding:2rem 2.5rem 2.5rem;
  box-shadow:0 2px 0 #10131e,0 4px 0 #0c0f18,0 12px 36px rgba(0,0,0,0.75),
             inset 0 1px 0 rgba(255,255,255,0.08),
             0 0 0 1px rgba(100,120,180,0.15);
  max-width:820px; margin:0 auto; position:relative;
}
.cassette-shell::before,.cassette-shell::after {
  content:''; position:absolute; top:1rem; width:9px; height:9px;
  border-radius:50%; background:#0d1020; border:1px solid #5a6480;
  box-shadow:inset 0 1px 2px rgba(0,0,0,0.8);
}
.cassette-shell::before { left:1.2rem; }
.cassette-shell::after  { right:1.2rem; }

.cassette-label {
  background:linear-gradient(135deg,#1a2240,#141d38);
  border:1px solid #3a4468; border-radius:6px;
  padding:0.9rem 1.2rem; margin-bottom:1.2rem;
  display:flex; align-items:center; justify-content:space-between;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.06), 0 1px 3px rgba(0,0,0,0.5);
}
.cassette-brand {
  font-size:0.55rem; letter-spacing:0.3em; text-transform:uppercase;
  background:linear-gradient(90deg,#00e5ff,#a855f7);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.cassette-name {
  font-size:0.95rem; letter-spacing:0.05em; color:#e8eef8;
  font-weight:bold; margin-top:0.15rem;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:480px;
}

.cassette-window {
  background:#080c14; border:2px solid #2e3a52; border-radius:50px;
  padding:0.7rem 1.2rem; margin-bottom:1.2rem;
  display:flex; align-items:center; gap:0.8rem;
  box-shadow:inset 0 2px 10px rgba(0,0,0,0.9), 0 1px 0 rgba(255,255,255,0.04);
}
.reel {
  width:44px; height:44px; border-radius:50%; flex-shrink:0;
  background:radial-gradient(circle at 30% 30%,#2a3248,#0e1220);
  border:2px solid #3a4460; position:relative;
}
.reel::before { content:''; position:absolute; inset:8px; border-radius:50%; background:radial-gradient(circle at 35% 35%,#303a50,#10152a); border:1px solid #2a3448; }
.tape-path { flex:1; height:16px; position:relative; display:flex; align-items:center; justify-content:center; }
.tape-path::before { content:''; position:absolute; top:50%; left:0; right:0; height:5px; transform:translateY(-50%); background:linear-gradient(90deg,#1a2438,#00e5ff33,#1a2438); border-top:1px solid #3a4a60; border-bottom:1px solid #3a4a60; }
.tape-counter { font-size:0.6rem; color:#00e5ffaa; letter-spacing:0.15em; background:#080c14; padding:0.1rem 0.4rem; border:1px solid #2a3a50; border-radius:2px; position:relative; z-index:1; }
.cassette-notch { position:absolute; bottom:-1px; left:50%; transform:translateX(-50%); width:60px; height:8px; background:#080b10; border:2px solid #4a5270; border-top:none; border-radius:0 0 4px 4px; }

/* featured player — slides in */
.featured-player {
  overflow:hidden; max-height:0; transition:max-height 0.4s ease;
  margin-bottom:0;
}
.featured-player.open { max-height:300px; margin-bottom:1rem; }
.featured-inner {
  display:flex; gap:1rem; padding:0.8rem;
  background:#04060c; border:1px solid #111820; border-radius:6px;
  align-items:flex-start;
}
.featured-art { width:100px; height:100px; flex-shrink:0; border-radius:4px; overflow:hidden; }
.featured-art img { width:100%; height:100%; object-fit:cover; }
.featured-meta { flex:1; min-width:0; }
.featured-show { font-size:0.52rem; color:#00e5ff55; letter-spacing:0.12em; text-transform:uppercase; margin-bottom:0.3rem; }
.featured-title { font-size:0.8rem; color:#c0cad6; line-height:1.4; margin-bottom:0.7rem; }
.featured-iframe { width:100%; }
.featured-iframe iframe { width:100%; height:80px; border:none; border-radius:4px; }


/* ════════════════
   B — TAPE DECK CONSOLE
════════════════ */
.deck-shell {
  background:linear-gradient(170deg,#191e2a,#0d1018);
  border:2px solid #252e40; border-radius:10px; padding:1.5rem;
  box-shadow:0 10px 40px rgba(0,0,0,0.7),inset 0 1px 0 rgba(255,255,255,0.04);
  max-width:900px; margin:0 auto;
}
/* slim status bar: LCD title + VU meters */
.deck-header {
  display:flex; align-items:center; gap:1rem; margin-bottom:0.8rem;
}
.deck-display { flex:1; background:#020508; border:1px solid #1a2535; border-radius:4px; padding:0.6rem 1rem; box-shadow:inset 0 2px 6px rgba(0,0,0,0.9); min-width:0; }
.deck-display-label { font-size:0.48rem; letter-spacing:0.2em; color:#1a3040; text-transform:uppercase; margin-bottom:0.2rem; }
.deck-display-title { font-size:0.75rem; color:#00e5ff88; letter-spacing:0.03em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.deck-display-show { font-size:0.5rem; color:#1a3040; margin-top:0.12rem; }
.vu-meters { display:flex; gap:3px; align-items:flex-end; height:44px; flex-shrink:0; }
.vu-bar {
  width:5px; border-radius:1px 1px 0 0;
  background:linear-gradient(to top,#00e5ff,#00ff88 60%,#ffcc00 80%,#ff4444 100%);
  opacity:0.7; transform-origin:bottom;
  animation:vu-dance var(--dur,0.5s) ease-in-out infinite var(--delay,0s);
}
@keyframes vu-dance {
  0%,100% { transform:scaleY(0.25); opacity:0.4; }
  50%      { transform:scaleY(1);    opacity:0.85; }
}

/* iframe — always rendered, hidden until episode selected */
.deck-player { overflow:hidden; max-height:0; transition:max-height 0.45s ease; }
.deck-player.open { max-height:160px; margin-bottom:0.8rem; }
.deck-player iframe { width:100%; height:152px; border:none; border-radius:4px; display:block; }

.deck-divider { height:1px; background:linear-gradient(90deg,transparent,#1a2535,transparent); margin:0.8rem 0; }
.deck-controls { display:flex; align-items:center; justify-content:center; gap:0.5rem; margin-bottom:0.8rem; }
.deck-btn { width:28px; height:28px; border-radius:4px; border:1px solid #1e2a3a; background:#0d1220; color:#445; font-size:0.55rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; box-shadow:0 2px 0 #080b10; }
.deck-btn:hover, .deck-btn.on { border-color:#00e5ff66; color:#00e5ff; background:#0a1520; }
.deck-btn.play { width:36px; height:36px; border-radius:50%; }
.deck-tracklist { background:#07090f; border:1px solid #111820; border-radius:6px; overflow:hidden; }


/* ════════════════
   C — WALKMAN
   Click → overlay dentro del walkman muestra art grande + iframe
════════════════ */
.walkman {
  background:linear-gradient(150deg,#1c2130,#0e1118 60%,#0c0f18);
  border:2px solid #2a3348; border-radius:16px 16px 40px 40px / 16px 16px 60px 60px;
  padding:1.5rem 2rem 3rem; box-shadow:0 0 0 1px #0a0d16,4px 6px 0 #070a12,0 20px 60px rgba(0,0,0,0.8),inset 0 1px 0 rgba(255,255,255,0.06);
  max-width:500px; margin:0 auto; position:relative;
}
.walkman-brand { display:flex; justify-content:space-between; align-items:center; margin-bottom:0.8rem; }
.walkman-logo { font-size:0.6rem; letter-spacing:0.3em; text-transform:uppercase; background:linear-gradient(90deg,#00e5ff,#a855f7); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.walkman-model { font-size:0.5rem; color:#222; letter-spacing:0.1em; }

.walkman-lcd { background:#020c08; border:1px solid #0a2018; border-radius:4px; padding:0.6rem 1rem; margin-bottom:0.8rem; box-shadow:inset 0 2px 8px rgba(0,0,0,0.9); }
.walkman-lcd-label { font-size:0.48rem; letter-spacing:0.15em; color:#0a2a1a; text-transform:uppercase; margin-bottom:0.2rem; }
.walkman-lcd-title { font-size:0.72rem; color:#00ff8899; line-height:1.3; }
.walkman-lcd-show { font-size:0.5rem; color:#0a3020; margin-top:0.15rem; letter-spacing:0.08em; }

.walkman-window { background:#040710; border:2px solid #111820; border-radius:40px; padding:0.7rem 1.2rem; margin-bottom:0.8rem; display:flex; align-items:center; gap:0.8rem; box-shadow:inset 0 3px 10px rgba(0,0,0,0.9); }
.wm-reel { width:40px; height:40px; border-radius:50%; flex-shrink:0; background:radial-gradient(circle at 30% 30%,#1a2030,#080c14); border:2px solid #141c28; position:relative; }
.wm-reel::before { content:''; position:absolute; inset:7px; border-radius:50%; background:radial-gradient(circle at 35% 35%,#20283a,#0c1020); border:1px solid #1a2030; }
.wm-tape { flex:1; height:4px; position:relative; }
.wm-tape::before { content:''; position:absolute; inset:0; background:linear-gradient(90deg,#0d1520,#00e5ff22,#0d1520); border-radius:2px; border-top:1px solid #1a2535; }
.wm-led { position:absolute; right:0; top:50%; transform:translateY(-50%); width:5px; height:5px; border-radius:50%; background:#00e5ff; box-shadow:0 0 6px #00e5ff; animation:blink 1.4s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:0.2} }

.walkman-controls { display:flex; align-items:center; justify-content:center; gap:0.5rem; margin-bottom:1rem; }
.wm-btn { width:26px; height:26px; border-radius:50%; border:1px solid #1e2a3a; background:radial-gradient(circle at 35% 35%,#1a2030,#0a0e1a); color:#334; font-size:0.5rem; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 0 #060810; transition:all 0.15s; }
.wm-btn:hover { border-color:#00e5ff55; color:#00e5ff; }
.wm-btn.big { width:36px; height:36px; font-size:0.65rem; border-color:#00e5ff33; color:#00e5ff55; }

/* walkman popup player */
.walkman-popup {
  position:absolute; inset:0; border-radius:14px 14px 38px 38px;
  background:rgba(4,6,12,0.97); display:none; flex-direction:column;
  padding:1.5rem 1.8rem; z-index:10; backdrop-filter:blur(4px);
}
.walkman-popup.open { display:flex; }
.popup-close { align-self:flex-end; background:transparent; border:1px solid #1a2535; color:#445; font-size:0.6rem; padding:0.2rem 0.5rem; cursor:pointer; border-radius:3px; margin-bottom:0.8rem; font-family:inherit; }
.popup-close:hover { color:#00e5ff; border-color:#00e5ff44; }
.popup-art { width:80px; height:80px; border-radius:4px; overflow:hidden; margin:0 auto 0.8rem; }
.popup-art img { width:100%; height:100%; object-fit:cover; }
.popup-title { font-size:0.68rem; color:#c0cad6; text-align:center; line-height:1.4; margin-bottom:0.8rem; }
.popup-show { font-size:0.5rem; color:#00e5ff55; text-align:center; letter-spacing:0.12em; text-transform:uppercase; margin-bottom:0.8rem; }
.popup-iframe iframe { width:100%; height:152px; border:none; border-radius:4px; }

.walkman-list { background:#04060c; border:1px solid #0e1520; border-radius:6px; max-height:240px; overflow-y:auto; }
.walkman-list::-webkit-scrollbar { width:3px; }
.walkman-list::-webkit-scrollbar-thumb { background:#1a2535; border-radius:2px; }
</style>
</head>
<body>

<nav>
  <button class="active" onclick="show('a',event)">A · Cassette shell</button>
  <button onclick="show('b',event)">B · Tape deck console</button>
  <button onclick="show('c',event)">C · Walkman</button>
</nav>

<!-- ══ A ══ -->
<div class="panel active" id="p-a">
  <div class="cassette-shell">
    <div class="cassette-label">
      <div>
        <div class="cassette-brand">ACATINCHO · MIND MAP</div>
        <div class="cassette-name">Podcast</div>
      </div>
      <div style="font-size:0.55rem;color:#1a2535;letter-spacing:0.15em">C-90 · TYPE II</div>
    </div>
    <div class="cassette-window">
      <div class="reel"></div>
      <div class="tape-path"><div class="tape-counter" id="counter-a">000:00</div></div>
      <div class="reel"></div>
    </div>
    <!-- featured player drops here -->
    <div class="featured-player" id="fp-a">
      <iframe id="fp-a-iframe" src="" allow="autoplay;clipboard-write;encrypted-media;fullscreen;picture-in-picture" style="width:100%;height:152px;border:none;border-radius:4px;display:block;"></iframe>
    </div>
    <div class="ep-list" id="ep-a"></div>
    <div class="cassette-notch"></div>
  </div>
</div>

<!-- ══ B ══ -->
<div class="panel" id="p-b">
  <div class="deck-shell">
    <!-- slim header: LCD display + VU meters -->
    <div class="deck-header">
      <div class="deck-display">
        <div class="deck-display-label">Now playing</div>
        <div class="deck-display-title" id="deck-title">Seleccioná un episodio</div>
        <div class="deck-display-show" id="deck-show">— — —</div>
      </div>
      <div class="vu-meters" id="vu"></div>
    </div>
    <!-- full Spotify iframe -->
    <div class="deck-player" id="dp-b">
      <iframe id="deck-iframe" src="" allow="autoplay;clipboard-write;encrypted-media;fullscreen;picture-in-picture"></iframe>
    </div>
    <div class="deck-controls">
      <button class="deck-btn" id="btn-prev">⏮</button>
      <button class="deck-btn" id="btn-rew">⏪</button>
      <button class="deck-btn play" id="btn-play">▶</button>
      <button class="deck-btn" id="btn-fwd">⏩</button>
      <button class="deck-btn" id="btn-next">⏭</button>
    </div>
    <div class="deck-divider"></div>
    <div class="deck-tracklist" id="ep-b"></div>
  </div>
</div>

<!-- ══ C ══ -->
<div class="panel" id="p-c">
  <div class="walkman">
    <!-- overlay popup -->
    <div class="walkman-popup" id="wm-popup">
      <button class="popup-close" onclick="closePopup()">✕ cerrar</button>
      <div class="popup-art"><img id="wm-popup-img" src="" alt=""></div>
      <div class="popup-show" id="wm-popup-show"></div>
      <div class="popup-title" id="wm-popup-title"></div>
      <div class="popup-iframe"><iframe id="wm-popup-iframe" src="" allow="autoplay;clipboard-write;encrypted-media;fullscreen;picture-in-picture"></iframe></div>
    </div>

    <div class="walkman-brand">
      <div class="walkman-logo">ACATINCHO</div>
      <div class="walkman-model">WM-PODCAST</div>
    </div>
    <div class="walkman-lcd">
      <div class="walkman-lcd-label">Now playing</div>
      <div class="walkman-lcd-title" id="wm-title">Seleccioná un episodio</div>
      <div class="walkman-lcd-show" id="wm-show">— — —</div>
    </div>
    <div class="walkman-window">
      <div class="wm-reel"></div>
      <div class="wm-tape"><div class="wm-led"></div></div>
      <div class="wm-reel"></div>
    </div>
    <div class="walkman-controls">
      <button class="wm-btn">⏮</button>
      <button class="wm-btn">⏪</button>
      <button class="wm-btn big">▶</button>
      <button class="wm-btn">⏩</button>
      <button class="wm-btn">⏭</button>
    </div>
    <div class="walkman-list" id="ep-c"></div>
  </div>
</div>

<script>
const EPS = [
  { id:'4z0LhALFCOK3kiC8Ptwohk', show:'IA sin humo',        title:'Director de Microsoft habla sobre AGI, OpenAI, Estrategia IA para pymes', thumb:'https://image-cdn-ak.spotifycdn.com/image/ab6772ab000015bebd55b7b220a34f1928d0c333' },
  { id:'0KU4mcByNNScezystDO1tE', show:'Tech & Coffee',       title:'"La IA es una disrupción comparable a la imprenta"', thumb:'https://image-cdn-ak.spotifycdn.com/image/ab67656300005f1fa63a2a7ca220ff17079327e7' },
  { id:'6Es7ukEZpOkH0QDfFQ64me', show:'Director Podcast',   title:'#E38 — Dilemas en GenAI: ROI y Gobernanza', thumb:'https://image-cdn-ak.spotifycdn.com/image/ab6772ab000015be0bbde336f329ea61b2bcf45f' },
  { id:'0qCWHMMkAGBhVvO1wHC2FC', show:'IA sin humo',        title:'Los SECRETOS de la IA contados desde MICROSOFT', thumb:'https://image-cdn-ak.spotifycdn.com/image/ab6772ab000015bef98938e6cc6f46817d636548' },
  { id:'6RPpk7XOVcXy9m09doykhg', show:'Data & AI Tips',    title:'IA en empresas — consejos del director de Data & AI', thumb:'https://image-cdn-ak.spotifycdn.com/image/ab67656300005f1f87314e424cd0817c5fe71bcf' },
  { id:'1bOz7nTlQBZUBlfwXBIcQ0', show:'CTO Crack',          title:'#E14 — IA, IA, IA… sí, Inteligencia Artificial', thumb:'https://image-cdn-fa.spotifycdn.com/image/ab6772ab000015be06a2901b14c0dc0ac827ee7a' },
  { id:'2fchLgJMnpDdxJ6rhkgYPQ', show:'Marketing Digital',  title:'ChatGPT irrumpe en marketing digital – parte 2', thumb:'https://image-cdn-ak.spotifycdn.com/image/ab67656300005f1f101c9192cac441d8e6b34ff5' },
  { id:'16jwYaEkkE9y5gqWDIAcvA', show:'Marketing Digital',  title:'ChatGPT irrumpe en marketing digital', thumb:'https://image-cdn-ak.spotifycdn.com/image/ab67656300005f1f101c9192cac441d8e6b34ff5' },
  { id:'3YydWW1kx43FdV7EB2gedn', show:'El Futuro Tech',     title:'El Futuro Tecnológico — E06', thumb:'https://image-cdn-ak.spotifycdn.com/image/ab67656300005f1f1fd370a24c2fffc210ffcf36' },
];

function spotifySrc(id) {
  return `https://open.spotify.com/embed/episode/${id}?utm_source=generator&theme=0`;
}

function buildRows(containerId, onClick) {
  const el = document.getElementById(containerId);
  EPS.forEach((ep, i) => {
    const row = document.createElement('div');
    row.className = 'ep-row';
    row.dataset.idx = i;
    row.innerHTML = `
      <div class="ep-thumb"><img src="${ep.thumb}" alt="${ep.show}"></div>
      <div class="ep-info">
        <div class="ep-show">${ep.show}</div>
        <div class="ep-title">${ep.title}</div>
      </div>
      <div class="ep-play">▶</div>`;
    row.addEventListener('click', () => {
      el.querySelectorAll('.ep-row').forEach(r => r.classList.remove('active'));
      row.classList.add('active');
      onClick(ep, i);
    });
    el.appendChild(row);
  });
}

// A — cassette: featured player drops in
buildRows('ep-a', ep => {
  document.getElementById('fp-a-iframe').src = spotifySrc(ep.id);
  document.getElementById('fp-a').classList.add('open');
  document.getElementById('counter-a').textContent = '▶ PLAYING';
  document.querySelector('.cassette-name').textContent = ep.title;
});

// B — deck
let currentIdx = -1;

function playDeckEp(idx) {
  currentIdx = idx;
  const ep = EPS[idx];
  document.getElementById('deck-title').textContent = ep.title.length > 60 ? ep.title.slice(0,58)+'…' : ep.title;
  document.getElementById('deck-show').textContent  = ep.show;
  document.getElementById('deck-iframe').src        = spotifySrc(ep.id);
  document.getElementById('dp-b').classList.add('open');
  document.getElementById('btn-play').classList.add('on');
  // sync active row
  document.querySelectorAll('#ep-b .ep-row').forEach((r,i) => r.classList.toggle('active', i===idx));
}

buildRows('ep-b', (ep, idx) => { playDeckEp(idx); });

document.getElementById('btn-prev').addEventListener('click', () => {
  if (currentIdx > 0) playDeckEp(currentIdx - 1);
});
document.getElementById('btn-next').addEventListener('click', () => {
  if (currentIdx < EPS.length - 1) playDeckEp(currentIdx + 1);
});
document.getElementById('btn-play').addEventListener('click', function() {
  if (currentIdx === -1) playDeckEp(0);
  this.classList.toggle('on');
});
document.getElementById('btn-rew').addEventListener('click', () => {
  if (currentIdx > 0) playDeckEp(currentIdx - 1);
});
document.getElementById('btn-fwd').addEventListener('click', () => {
  if (currentIdx < EPS.length - 1) playDeckEp(currentIdx + 1);
});

// C — walkman: overlay popup
buildRows('ep-c', ep => {
  document.getElementById('wm-title').textContent       = ep.title.slice(0,60) + '…';
  document.getElementById('wm-show').textContent        = ep.show;
  document.getElementById('wm-popup-img').src           = ep.thumb;
  document.getElementById('wm-popup-show').textContent  = ep.show;
  document.getElementById('wm-popup-title').textContent = ep.title;
  document.getElementById('wm-popup-iframe').src        = spotifySrc(ep.id);
  document.getElementById('wm-popup').classList.add('open');
});

function closePopup() {
  document.getElementById('wm-popup').classList.remove('open');
  document.getElementById('wm-popup-iframe').src = '';
}

// VU bars — staggered animation
const vu = document.getElementById('vu');
const vuHeights = [8,14,22,30,24,18,28,20,12,16,8];
const vuDurs    = [0.45,0.38,0.52,0.41,0.48,0.35,0.55,0.43,0.39,0.47,0.42];
vuHeights.forEach((h, i) => {
  const bar = document.createElement('div');
  bar.className = 'vu-bar';
  bar.style.cssText = `height:${h}px;--dur:${vuDurs[i]}s;--delay:${(i*0.04).toFixed(2)}s`;
  vu.appendChild(bar);
});

function show(id, e) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('p-'+id).classList.add('active');
  e.target.classList.add('active');
}
</script>
